experiment:
  seed: 42
  device: cpu

data:
  data_root: ./data
  batch_size: 128
  normalization:
    mean: [0.4914, 0.4822, 0.4465]
    std: [0.2470, 0.2435, 0.2616]

model:
  name: resnet18

train:
  epochs: 200
  optimizer:
    lr: 0.1
    momentum: 0.9
    weight_decay: 0.0005
    nesterov: true
  scheduler:
    min_lr: 0.00001

eval:
  robustness:
    root: ./data/CIFAR-10-C

output:
  dir: ./results
  run_name: baseline_no_aug
